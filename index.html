<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الحلقات - براء عكاوي</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Arial', sans-serif; }
        .header-bg { background: linear-gradient(45deg, #1b5e20, #2e7d32); color: white; padding: 20px; border-radius: 0 0 20px 20px; }
        .card { border: none; border-radius: 15px; }
    </style>
</head>
<body>

<div class="header-bg text-center shadow-sm mb-4">
    <h2>نظام إدارة حلقات التحفيظ ودروس التقوية</h2>
    <p>مشروع مبرمج الويب: براء محمود عكاوي</p>
</div>

<div class="container">
    <!-- نموذج الإضافة -->
    <div class="card shadow p-4 mb-4">
        <h5 class="mb-3 text-success">إضافة طالب جديد</h5>
        <form action="/add" method="POST" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="name" class="form-control" placeholder="اسم الطالب" required>
            </div>
            <div class="col-md-3">
                <select name="course" class="form-select">
                    <option value="حلقة تحفيظ">حلقة تحفيظ</option>
                    <option value="دروس تقوية">دروس تقوية</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="number" name="juz" class="form-control" placeholder="الأجزاء المنجزة">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success w-100">إضافة</button>
            </div>
        </form>
    </div>

    <!-- ميزة البحث بالجافا سكريبت -->
    <div class="mb-3">
        <input type="text" id="searchInput" class="form-control" placeholder="🔍 ابحث عن اسم طالب أو نوع الحلقة...">
    </div>

    <!-- الجدول -->
    <div class="table-responsive">
        <table class="table table-hover bg-white shadow-sm rounded overflow-hidden" id="studentsTable">
            <thead class="table-dark">
                <tr>
                    <th>اسم الطالب</th>
                    <th>نوع الدورة</th>
                    <th>الأجزاء المحفوظة</th>
                    <th>تاريخ التسجيل</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td><strong>{{ student.name }}</strong></td>
                    <td><span class="badge bg-primary">{{ student.course }}</span></td>
                    <td>{{ student.juz }} أجزاء</td>
                    <td>{{ student.reg_date }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- كود JavaScript للبحث الفوري -->
<script>
    document.getElementById('searchInput').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#studentsTable tbody tr');

        rows.forEach(row => {
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? '' : 'none';
        });
    });
</script>

</body>
</html>
